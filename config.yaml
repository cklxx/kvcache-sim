# ──────────────────────────────────────────────────────────────────────
# kvcache-sim configuration
#
# Sizes model a 70B deployment profile on H100-class GPUs.
# The simulator only tracks metadata — no real memory is allocated,
# so using full-size values is both accurate and tractable.
#
# Reference: H100 80GB SXM / 70B serving profile
#   HBM capacity: 80 GB, simulated KV budget: 5 GB per GPU
#   HBM bandwidth: 3350 GB/s
#   FP16 tensor: 989 TFLOPS (peak), ~800 effective
#
# Reference: Llama-3-70B (GQA, 8 KV heads, 80 layers, head_dim=128)
#   KV per token: 2 × 8 × 128 × 2B × 80L = 327,680 B = 320 KiB
#   vLLM block: 16 tokens → 5 MiB per block
#   HBM budget: 5 GB → ~953 blocks
# ──────────────────────────────────────────────────────────────────────

# ── Single-node mode (python main.py) ────────────────────────────────

hardware:
  hbm:
    capacity_gb: 5              # 70B model: 80GB - 65GB weights - 10GB activations
    read_bw_gbps: 3350
    write_bw_gbps: 3350
    read_latency_ms: 0.001      # ~1 μs
  dram:
    capacity_gb: 256            # host DDR5 (CPU-attached)
    read_bw_gbps: 200           # DDR5-4800 bandwidth
    write_bw_gbps: 200
    read_latency_ms: 0.1        # ~100 μs PCIe + DRAM
  ssd:
    capacity_gb: 3200           # NVMe SSD
    read_bw_gbps: 7             # Gen4 NVMe
    write_bw_gbps: 4
    read_latency_ms: 0.5        # ~500 μs

cache:
  block_size_bytes: 5242880     # 5 MiB = 16 tokens × 320 KiB/token (70B vLLM page)
  num_workers: 4
  promote_on_hit: true
  async_backup: true

# ── Cluster mode (python main.py --cluster) ──────────────────────────

cluster:
  # Full 万卡 cluster description
  total_gpus: 10240             # 10K GPUs total
  gpus_per_rack: 64             # production rack density

  # Simulation subset
  simulate_racks: 8
  simulate_gpus_per_rack: 16    # 8×16 = 128 GPUs simulated

  gpu:
    hbm_capacity_gb: 5          # KV budget for 70B model (80GB - 65GB weights - 10GB activations)
    hbm_read_bw_gbps: 3350
    hbm_write_bw_gbps: 3350
    hbm_latency_ms: 0.001

  eic:
    nodes_per_rack: 4           # 4 CXL memory expanders per rack
    capacity_per_node_gb: 32    # 32 GB per node → 128 GB shared EIC per rack
    read_bw_gbps: 100           # CXL 2.0 / RDMA
    write_bw_gbps: 80
    access_latency_ms: 0.005    # ~5 μs CXL round-trip

  network:
    intra_rack_latency_us: 3    # GPU ↔ EIC same rack (RDMA)
    cross_rack_latency_us: 15   # spine fabric
    remote_ssd_latency_us: 200  # disaggregated NVMe-oF
    nvlink_bw_gbps: 900         # NVLink 4.0 (H100 SXM, effective GB/s)
    nvlink_latency_us: 1        # intra-node GPU-to-GPU
    gpus_per_node: 8            # 8 GPUs per NVLink mesh

# ── Trace ────────────────────────────────────────────────────────────

# Single-node trace: mixed context lengths
trace:
  num_sessions: 3000
  turns_per_session: 4
  prompt_tokens_min: 256
  prompt_tokens_max: 2048
  initial_context_tokens: 4096    # 4K doc context
  num_system_prompts: 8
  qps: 30.0
  seed: 42

# ── Cluster trace (higher volume) ───────────────────────────────────

# Cluster trace: mixed workload (RAG + long-doc + multi-turn)
# 100 shared docs × 8K tokens: models RAG over a common knowledge base
# ~80 sessions per doc → high cross-GPU prefix sharing via EIC
cluster_trace:
  num_sessions: 8000
  turns_per_session: 4
  prompt_tokens_min: 512
  prompt_tokens_max: 4096
  initial_context_tokens: 8192    # 8K RAG/doc context per session
  num_system_prompts: 20
  num_shared_docs: 200            # 200 shared documents (RAG knowledge base)
  num_rag_chunks: 3               # retrieve 3 chunks per query
  doc_zipf_alpha: 1.2             # Zipf skew: top docs queried much more
  qps: 200.0
  seed: 42

# ── Policies & experiments ───────────────────────────────────────────

policies:
  eviction: lru
  prefetch: none
  selective_write: false
  selective_write_depth_threshold: 6

experiments:
  num_requests: 5000
  warmup_requests: 500
  output_dir: results

cluster_experiments:
  num_requests: 8000
  warmup_requests: 1000
  output_dir: results

# ── PD Separation mode (python main.py --pd) ────────────────────────

pd_separation:
  enabled: true
  pd_ratio: [1, 3]              # 1 prefill GPU : 3 decode GPUs per rack
  chunked_prefill: false
  chunk_size_tokens: 512
  max_output_tokens: 128

  compute:
    prefill_tflops: 800          # H100 FP16 effective TFLOPS
    decode_memory_bw_gbps: 3350  # H100 HBM bandwidth
    model_params_b: 70           # Llama-3-70B
    kv_bytes_per_token: 327680   # 320 KiB (2 × 8 KV heads × 128 × 2B × 80L)
    tokens_per_block: 16         # vLLM default page size
    overhead_factor: 1.0         # 70B: prefill ~0.35ms/tok, decode ~83.6ms/tok
    prefill_batch_efficiency: 0.85
    decode_kv_overhead_factor: 0.02

  transfer:
    strategy: push               # push | pull | pull_on_demand
    rdma_bw_gbps: 12.5           # Effective GB/s; 100 Gbps RDMA NIC = 12.5 GB/s
    rdma_latency_us: 5           # base RDMA latency
    pipelining: true
    pipeline_chunk_blocks: 16
    compression_ratio: 1.0

# PD trace: realistic RAG + long-doc workload
pd_trace:
  num_sessions: 3000
  turns_per_session: 4
  prompt_tokens_min: 512
  prompt_tokens_max: 4096
  initial_context_tokens: 8192    # 8K context per session
  num_system_prompts: 32
  qps: 100.0
  seed: 42

# Agent trace: long-context tool-use sessions (20-50 turns)
# Context grows to 32K-128K tokens per session
# Tool definitions shared across sessions (hot prefix via EIC)
agent_trace:
  num_sessions: 500
  turns_min: 15
  turns_max: 50
  tool_def_tokens: 2048           # shared tool definitions
  tool_result_min: 128            # small API responses
  tool_result_max: 4096           # large code/doc results
  reasoning_tokens: 256           # agent thinking per turn
  num_tool_sets: 5                # 5 shared tool definition sets
  num_system_prompts: 5
  qps: 20.0
  seed: 42

pd_experiments:
  num_requests: 4000
  warmup_requests: 400
  output_dir: results
  pd_ratios: [[1,1], [1,2], [1,3], [1,4], [1,7]]
