hardware:
  hbm:
    capacity_gb: 0.003     # 3 MB per worker — forces heavy eviction
    read_bw_gbps: 3200
    write_bw_gbps: 3200
    read_latency_ms: 0.001
  dram:
    capacity_gb: 0.008     # 8 MB per worker — moderate pressure
    read_bw_gbps: 200
    write_bw_gbps: 200
    read_latency_ms: 0.1
  ssd:
    capacity_gb: 0.1       # 100 MB per worker — cold storage
    read_bw_gbps: 7
    write_bw_gbps: 4
    read_latency_ms: 0.5

cache:
  block_size_bytes: 4096
  num_workers: 4
  promote_on_hit: true
  async_backup: true

trace:
  num_sessions: 200
  turns_per_session: 6
  prompt_tokens_min: 64
  prompt_tokens_max: 512
  num_system_prompts: 8
  qps: 20.0
  seed: 42

policies:
  eviction: lru          # lru | arc | learned
  prefetch: none         # none | session_aware
  selective_write: false
  selective_write_depth_threshold: 6

experiments:
  num_requests: 1200
  warmup_requests: 200
  output_dir: results
