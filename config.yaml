# ──────────────────────────────────────────────────────────────────────
# kvcache-sim configuration
# ──────────────────────────────────────────────────────────────────────

# ── Single-node mode (python main.py) ────────────────────────────────

hardware:
  hbm:
    capacity_gb: 0.003
    read_bw_gbps: 3200
    write_bw_gbps: 3200
    read_latency_ms: 0.001
  dram:
    capacity_gb: 0.008
    read_bw_gbps: 200
    write_bw_gbps: 200
    read_latency_ms: 0.1
  ssd:
    capacity_gb: 0.1
    read_bw_gbps: 7
    write_bw_gbps: 4
    read_latency_ms: 0.5

cache:
  block_size_bytes: 4096
  num_workers: 4
  promote_on_hit: true
  async_backup: true

# ── Cluster mode (python main.py --cluster) ──────────────────────────

cluster:
  # Full 万卡 cluster description (documentation)
  total_gpus: 10240           # 10K GPUs total
  gpus_per_rack: 64           # production rack density

  # Simulation subset (for tractability)
  simulate_racks: 8
  simulate_gpus_per_rack: 16  # 8×16 = 128 GPUs simulated

  gpu:
    hbm_capacity_gb: 0.003    # scaled down (ratio HBM:EIC ≈ 1:27 matches real H100)
    hbm_read_bw_gbps: 3200
    hbm_write_bw_gbps: 3200
    hbm_latency_ms: 0.001

  eic:
    nodes_per_rack: 4         # 4 EIC nodes per rack
    capacity_per_node_gb: 0.02  # 20 MB per node → 80 MB shared EIC per rack
    read_bw_gbps: 100         # CXL 2.0 / RDMA
    write_bw_gbps: 80
    access_latency_ms: 0.005  # ~5 μs CXL round-trip

  network:
    intra_rack_latency_us: 3    # GPU ↔ EIC same rack (RDMA)
    cross_rack_latency_us: 15   # spine fabric
    remote_ssd_latency_us: 200  # disaggregated NVMe-oF

# ── Trace ────────────────────────────────────────────────────────────

trace:
  num_sessions: 200
  turns_per_session: 6
  prompt_tokens_min: 64
  prompt_tokens_max: 512
  num_system_prompts: 8
  qps: 20.0
  seed: 42

# ── Cluster trace (higher volume) ───────────────────────────────────

cluster_trace:
  num_sessions: 5000
  turns_per_session: 5
  prompt_tokens_min: 64
  prompt_tokens_max: 512
  num_system_prompts: 20
  qps: 500.0
  seed: 42

# ── Policies & experiments ───────────────────────────────────────────

policies:
  eviction: lru
  prefetch: none
  selective_write: false
  selective_write_depth_threshold: 6

experiments:
  num_requests: 1200
  warmup_requests: 200
  output_dir: results

cluster_experiments:
  num_requests: 8000
  warmup_requests: 1000
  output_dir: results

# ── PD Separation mode (python main.py --pd) ────────────────────────

pd_separation:
  enabled: true
  pd_ratio: [1, 3]              # 1 prefill GPU : 3 decode GPUs per rack
  chunked_prefill: false
  chunk_size_tokens: 512
  max_output_tokens: 128

  compute:
    prefill_tflops: 800          # H100 FP16 effective TFLOPS (matmul)
    decode_memory_bw_gbps: 3200  # H100 HBM bandwidth
    model_params_b: 7            # 7B parameter model (e.g. Llama-3-8B)
    kv_bytes_per_token: 64       # 2 * 32_layers * 128_head_dim * 2 bytes / 8 (GQA)
    tokens_per_block: 32
    overhead_factor: 1.0         # pure compute, no extra overhead
    prefill_batch_efficiency: 0.85   # GPU util improvement with batching
    decode_kv_overhead_factor: 0.02  # marginal cost per active sequence in decode

  transfer:
    strategy: push               # push | pull | pull_on_demand
    rdma_bw_gbps: 100            # RDMA NIC bandwidth
    rdma_latency_us: 5           # base RDMA latency
    pipelining: true             # overlap transfer with decode start
    pipeline_chunk_blocks: 16    # blocks per pipeline chunk
    compression_ratio: 1.0       # 1.0 = no compression

pd_trace:
  num_sessions: 2000
  turns_per_session: 4
  prompt_tokens_min: 64
  prompt_tokens_max: 512
  initial_context_tokens: 256
  num_system_prompts: 32
  qps: 100.0
  seed: 42

pd_experiments:
  num_requests: 4000
  warmup_requests: 400
  output_dir: results
  pd_ratios: [[1,1], [1,2], [1,3], [1,4], [1,7]]
